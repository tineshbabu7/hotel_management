<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Dashboard - Serene Stay Hotel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="dashboard">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Serene Stay</a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="menu.html">Food Menu</a>
        <a href="booking.html">Room Booking</a>
        <a href="dashboard.html">Guest Dashboard</a>
        <a href="admin.html">Admin Panel</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="page-intro">
      <span class="eyebrow">Your Stay Details</span>
      <h1>Guest Dashboard</h1>
      <p>View your bookings and update check-in/check-out status quickly with your registered email.</p>
    </section>

    <section class="dashboard-card form-card">
      <form id="guestSearchForm">
        <label for="guestSearchEmail">Enter your email address</label>
        <input type="email" id="guestSearchEmail" name="guestSearchEmail" required placeholder="guest@example.com">
        <button type="submit" class="button button-primary">View Bookings</button>
      </form>
      <p id="dashboardMessage" class="form-message"></p>
    </section>

    <section id="guestBookings" class="dashboard-list"></section>
    <section id="guestFoodOrders" class="dashboard-list"></section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Serene Stay Hotel.</p>
      <nav class="footer-nav">
        <a href="booking.html">Room Booking</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
